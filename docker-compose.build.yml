# Local development override - builds the image from source instead of pulling
# the published one. Use with:
#
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up --build
#
# The default `docker compose up` (using only docker-compose.yml) pulls
# ghcr.io/phillyurbs/mcparr:latest, which is what Portainer and end users want.

services:
  mcparr:
    build:
      context: .
      dockerfile: docker/Dockerfile
