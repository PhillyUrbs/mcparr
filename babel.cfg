# Babel extraction config. Regenerate the template catalog with:
#   pybabel extract -F babel.cfg -o mcparr/ui/locales/messages.pot .
#   pybabel update -i mcparr/ui/locales/messages.pot -d mcparr/ui/locales -D messages
#   pybabel compile -d mcparr/ui/locales -D messages
[python: mcparr/**.py]
[jinja2: mcparr/ui/templates/**.html]
extensions=jinja2.ext.i18n
